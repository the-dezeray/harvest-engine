
services:

  rabbitmq:
    image: rabbitmq:3-management
    container_name: harvest-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: nexus
      RABBITMQ_DEFAULT_PASS: nexuspass
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    restart: unless-stopped

  api:
    build: ./api
    container_name: harvest-api
    ports:
      - "8000:8000"
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: nexus
      RABBITMQ_PASS: nexuspass
    volumes:
      - ./api:/app
    depends_on:
      - rabbitmq
    restart: unless-stopped

volumes:
  rabbitmq_data:
