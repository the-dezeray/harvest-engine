
services:

  rabbitmq:
    image: rabbitmq:3-management
    container_name: harvest-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: nexus
      RABBITMQ_DEFAULT_PASS: nexuspass
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: harvest-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  api:
    build: ./api
    container_name: harvest-api
    ports:
      - "8000:8000"
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: nexus
      RABBITMQ_PASS: nexuspass
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      ML_SERVICE_URL: http://ml-service:8001
      # Worker scale controls rely on docker-compose + host docker socket.
      COMPOSE_FILE_PATH: /workspace/docker-compose.yml
      WORKER_MAX_COUNT: "10"
      LIVE_TO_TARGET_SCALE: "800"
    volumes:
      - ./api:/app
      - ./:/workspace
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - rabbitmq
      - redis
    restart: unless-stopped

  worker:
    build: ./worker
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: nexus
      RABBITMQ_PASS: nexuspass
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      ML_SERVICE_URL: http://ml-service:8001
      ADNE_FREQ: 1_day
      LIVE_TO_TARGET_SCALE: "2000"
    depends_on:
      - rabbitmq
      - redis
    restart: unless-stopped

  ml-service:
    build: ./ml_service
    container_name: harvest-ml-service
    ports:
      - "8001:8001"
    environment:
      ADNE_DATASET_PATH: /institution_subnets
      ADNE_FREQ: 1_day
      ADNE_TARGET_COL: n_flows
    volumes:
      # Code expects these at /.. relative to /app/main.py
      - ./institution_subnets:/institution_subnets
      - ./times:/times
    restart: unless-stopped

  emitter:
    build: 
      context: ./emitter
      dockerfile: ../worker/Dockerfile
    container_name: harvest-emitter
    command: python emitter.py
    environment:
      API_URL: http://api:8000/ingest
      SCENARIO_URL: http://api:8000/scenario
      DATA_FOLDER: /institution_subnets/agg_1_day
    volumes:
      - ./emitter:/app
      - ./institution_subnets:/institution_subnets
    depends_on:
      - api
    restart: unless-stopped

volumes:
  rabbitmq_data:
